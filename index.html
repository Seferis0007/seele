<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>seele — 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #FFF8F5;
      --card-bg:     #FFFFFF;
      --text:        #4A3F3A;
      --text-light:  #9B8B82;
      --accent:      #E8A0B4;
      --accent-dark: #C97A8E;
      --accent-soft: #F6D5DC;
      --cream:       #FFF0EA;
      --border:      #F0E4DE;
      --shadow:      rgba(200, 140, 160, 0.15);
      --radius:      16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', 'SimSun', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ===== 导航 ===== */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,245,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between; height: 60px;
    }
    .nav-logo {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 22px; color: var(--accent-dark);
      text-decoration: none; letter-spacing: 3px;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* 添加按钮 */
    .btn-add {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 50px;
      border: 1.5px solid var(--accent);
      background: var(--card-bg);
      color: var(--accent-dark);
      font-family: inherit; font-size: 13px;
      letter-spacing: 1px; cursor: pointer;
      transition: all 0.3s;
    }
    .btn-add:hover {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 14px var(--shadow);
      transform: translateY(-2px);
    }

    .nav-link {
      text-decoration: none; color: var(--text-light);
      font-size: 13px; letter-spacing: 2px;
      transition: color 0.3s;
    }
    .nav-link:hover { color: var(--accent-dark); }

    /* ===== Hero ===== */
    header {
      text-align: center; padding: 80px 24px 60px;
      background: linear-gradient(180deg, var(--cream) 0%, var(--bg) 100%);
      position: relative; overflow: hidden;
    }
    header::before, header::after {
      content: ''; position: absolute; border-radius: 50%; opacity: 0.35; z-index: 0;
    }
    header::before {
      width: 380px; height: 380px;
      background: radial-gradient(circle, var(--accent-soft), transparent 70%);
      top: -120px; right: -80px;
    }
    header::after {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #FFF0D4, transparent 70%);
      bottom: -60px; left: -60px;
    }
    .hero-content { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 6px var(--cream), 0 4px 20px var(--shadow);
      margin-bottom: 24px; background: var(--accent-soft);
    }
    .hero-name {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 42px; color: var(--accent-dark); letter-spacing: 6px; margin-bottom: 8px;
    }
    .hero-sub {
      font-size: 13px; color: var(--text-light); letter-spacing: 4px; margin-bottom: 20px;
    }
    .hero-bio {
      font-size: 15px; color: var(--text); max-width: 420px; margin: 0 auto 28px; opacity: 0.8;
    }
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 32px;
    }

    /* ===== 筛选 ===== */
    .filter-bar {
      display: flex; justify-content: center; gap: 8px;
      padding: 40px 24px 32px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 22px; border-radius: 50px;
      border: 1.5px solid var(--border); background: var(--card-bg);
      color: var(--text-light); font-family: inherit;
      font-size: 13px; letter-spacing: 2px; cursor: pointer;
      transition: all 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 4px 14px var(--shadow);
    }

    /* ===== 画廊 ===== */
    .gallery-wrap { position: relative; }
    .gallery {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px 80px; columns: 3 280px; column-gap: 20px;
    }

    .work-card {
      break-inside: avoid; margin-bottom: 20px;
      border-radius: var(--radius); overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 2px 12px var(--shadow);
      transition: transform 0.35s, box-shadow 0.35s;
      position: relative;
    }
    .work-card:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(200,140,160,0.25); }
    .work-card img { width: 100%; display: block; }
    .work-info { padding: 14px 16px 16px; }
    .work-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .work-tag { font-size: 11px; color: var(--accent-dark); letter-spacing: 1px; }

    /* 悬停遮罩 */
    .work-card .overlay {
      position: absolute; inset: 0;
      background: rgba(200,120,140,0.85);
      display: flex; align-items: center; justify-content: center;
      gap: 20px; opacity: 0; transition: opacity 0.3s; border-radius: var(--radius);
    }
    .work-card:hover .overlay { opacity: 1; }
    .overlay span {
      color: #fff; font-size: 13px; letter-spacing: 3px; cursor: pointer;
    }
    .overlay .btn-delete {
      color: #fff; font-size: 12px; letter-spacing: 2px;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.5);
      border-radius: 8px; padding: 4px 12px; cursor: pointer;
      transition: background 0.3s;
    }
    .overlay .btn-delete:hover { background: rgba(180,60,60,0.7); }

    .tag-comic    { --accent: #C49AD4; --accent-dark: #9B6EB5; }
    .tag-illust   { --accent: #E8A0B4; --accent-dark: #C97A8E; }
    .tag-video    { --accent: #7EBAD6; --accent-dark: #4A93B5; }
    .tag-game     { --accent: #A8C97E; --accent-dark: #7BA84A; }

    /* 空状态 */
    .empty-state {
      text-align: center; color: var(--text-light); padding: 60px 24px;
      font-size: 14px; letter-spacing: 2px;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(60,40,45,0.45);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 200; justify-content: center; align-items: center;
      padding: 24px; animation: fadeIn 0.25s ease;
    }
    .modal-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .modal {
      background: var(--card-bg); border-radius: var(--radius);
      width: 100%; max-width: 500px; padding: 36px 32px 28px;
      box-shadow: 0 20px 60px rgba(60,40,45,0.2);
      animation: slideUp 0.3s ease; position: relative;
    }
    .modal-title {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 22px; color: var(--accent-dark);
      letter-spacing: 3px; margin-bottom: 24px; text-align: center;
    }
    .modal-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; color: var(--text-light);
      font-size: 22px; cursor: pointer; line-height: 1;
      transition: color 0.3s;
    }
    .modal-close:hover { color: var(--text); }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 13px; color: var(--text-light);
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .form-input, .form-select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 14px; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color 0.3s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }

    /* 上传区域 */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 24px; text-align: center; cursor: pointer;
      transition: all 0.3s; position: relative;
      background: var(--bg);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent); background: var(--accent-soft);
    }
    .upload-zone.has-image { padding: 8px; }
    .upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
    .upload-text { font-size: 13px; color: var(--text-light); letter-spacing: 1px; }
    .upload-hint { font-size: 11px; color: var(--text-light); margin-top: 6px; opacity: 0.6; }
    .upload-preview {
      max-width: 100%; max-height: 260px; border-radius: 8px;
      display: none; object-fit: contain;
    }
    .upload-zone.has-image .upload-preview { display: block; }
    .upload-zone.has-image .upload-icon,
    .upload-zone.has-image .upload-text,
    .upload-zone.has-image .upload-hint { display: none; }

    #fileInput { display: none; }

    .form-actions {
      display: flex; gap: 10px; margin-top: 28px;
    }
    .form-actions button {
      flex: 1; padding: 10px; border-radius: 50px;
      font-family: inherit; font-size: 14px; letter-spacing: 2px;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-cancel {
      background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text-light);
    }
    .btn-cancel:hover { border-color: var(--text-light); }
    .btn-save {
      background: var(--accent); border: 1.5px solid var(--accent);
      color: #fff;
    }
    .btn-save:hover {
      background: var(--accent-dark); border-color: var(--accent-dark);
      box-shadow: 0 4px 14px var(--shadow);
    }
    .btn-save:disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* ===== 页脚 ===== */
    footer {
      text-align: center; padding: 40px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-light); letter-spacing: 2px;
    }

    /* ===== 动画 ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 响应式 ===== */
    .work-card.sortable-ghost { opacity: 0.3; transform: scale(0.96); }
    .work-card.sortable-chosen { opacity: 0.7; }

    @media (max-width: 640px) {
      .hero-name  { font-size: 30px; }
      nav         { padding: 0 20px; }
      .gallery    { columns: 2; column-gap: 14px; padding: 0 14px 60px; }
      .modal      { padding: 28px 20px; }
      .nav-links  { display: none; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
</head>
<body>

<!-- ========== 导航栏 ========== -->
<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo">SE E L E</a>
    <div class="nav-right">
      <button class="btn-add" id="btnAdd" onclick="openModal()">+ 添加作品</button>
    </div>
  </div>
</nav>

<!-- ========== 头部 ========== -->
<header>
  <div class="hero-content">
    <img src="https://api.dicebear.com/7.x/miniavs/svg?seed=seele&backgroundColor=ffe4ea" alt="seele" class="avatar">
    <h1 class="hero-name">seele</h1>
    <p class="hero-sub">插画 / 漫画 / 视频 / 游戏</p>
    <div class="divider"></div>
    <p class="hero-bio">
      用画笔筑一个小小的世界。<br>
      漫画记录故事，插画留住情绪，视频呈现想象，游戏承载冒险。
    </p>
  </div>
</header>

<!-- ========== 作品区 ========== -->
<section id="works">
  <div class="filter-bar"></div>
  <div class="gallery-wrap">
    <div class="gallery" id="gallery"></div>
  </div>
</section>

<!-- ========== 添加作品弹窗 ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">✦ 添加作品</div>

    <div class="form-group">
      <label class="form-label">作品图片</label>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🖼</div>
        <div class="upload-text">点击选择图片</div>
        <div class="upload-hint">支持 JPG / PNG / WebP</div>
        <img class="upload-preview" id="uploadPreview" alt="">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="workTitle">作品名称</label>
      <input class="form-input" id="workTitle" type="text" placeholder="给作品起个名字吧" maxlength="50">
    </div>

    <div class="form-group">
      <label class="form-label" for="workCategory">作品分类</label>
      <select class="form-select" id="workCategory">
        <option value="illust">插画</option>
        <option value="comic">漫画</option>
        <option value="video">视频</option>
        <option value="game">游戏</option>
      </select>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="btnSave" onclick="saveWork()" disabled>保存</button>
    </div>
  </div>
</div>

<!-- ========== 页脚 ========== -->
<footer>
  <p>© 2025 seele · 欢迎交流合作</p>
</footer>

<script><script>
/* =========================
   数据来源：works.json + GitHub API
   ========================= */
const REPO_OWNER = 'Seferis0007';
const REPO_NAME  = 'Seferis0007.github.io';
const WORKS_PATH = 'works.json';
const API_URL    = https://api.github.com/repos///contents/;
const RAW_URL    = https://raw.githubusercontent.com///main/;

/* Token 管理 */
function getToken() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('token')) {
    const t = params.get('token');
    localStorage.setItem('gh_token', t);
    const newUrl = window.location.pathname + (params.has('admin') ? '?admin=1' : '') + window.location.hash;
    history.replaceState(null, '', newUrl);
    return t;
  }
  return localStorage.getItem('gh_token') || '';
}
const GH_TOKEN = getToken();

async function githubFetch(url, options = {}) {
  const headers = {
    'Authorization': 'token ' + GH_TOKEN,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github.v3+json',
  };
  if (options.headers) Object.assign(headers, options.headers);
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const text = await res.text();
    throw new Error('GitHub API ' + res.status + ': ' + text);
  }
  return res.json();
}

/* 加载作品 */
let allWorks = [];
let currentFilter = 'all';

async function loadWorks() {
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('无法加载作品数据');
    allWorks = await res.json();
    allWorks.sort((a, b) => (a.order ?? Infinity) - (b.order ?? Infinity));
    renderFilterBar();
    renderWorks();
  } catch (e) {
    console.error('加载失败:', e);
    document.getElementById('gallery').innerHTML = '<div class="empty-state"><p>加载作品失败 ✦</p></div>';
  }
}

const CAT_LABELS = { comic: '漫画', illust: '插画', video: '视频', game: '游戏' };
const CAT_TAGS  = { comic: 'tag-comic', illust: 'tag-illust', video: 'tag-video', game: 'tag-game' };

function renderWorks() {
  const gallery = document.getElementById('gallery');
  const filtered = currentFilter === 'all' ? allWorks : allWorks.filter(w => w.category === currentFilter);
  if (!filtered.length) {
    gallery.innerHTML = allWorks.length === 0
      ? '<div class="empty-state"><div class="empty-icon">🎨</div><p>还没有作品，点击右上角「+ 添加作品」开始吧</p></div>'
      : '<div class="empty-state"><p>这个分类还没有作品 ✦</p></div>';
    return;
  }
  gallery.innerHTML = filtered.map((w, i) => 
    <div class="work-card " data-category="" data-id="" style="animation: fadeUp 0.6s ease both; animation-delay: s">
      <img src="" alt="" loading="lazy">
      <div class="overlay">
        <span>查看</span>
        <button class="btn-delete" onclick="confirmDelete(, event)">删除</button>
      </div>
      <div class="work-info">
        <div class="work-title"></div>
        <div class="work-tag"></div>
      </div>
    </div>
  ).join('');
  initSortable();
}

function renderFilterBar() {
  const categories = new Set(allWorks.map(w => w.category));
  const bar = document.querySelector('.filter-bar');
  const counts = { all: allWorks.length };
  categories.forEach(c => { counts[c] = allWorks.filter(w => w.category === c).length; });
  const items = [
    { key: 'all', label: 全部  },
    ...Object.entries(CAT_LABELS).map(([k,v]) => ({ key: k, label: ${v}  })),
  ];
  bar.innerHTML = items.map(i => 
    <button class="filter-btn " data-filter="">
      
    </button>
  ).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderWorks();
    });
  });
}

/* 弹窗控制 */
function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('workTitle').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  resetForm();
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* 图片上传 */
let selectedFileData = null;
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  readFile(file);
}
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) readFile(file);
});
function readFile(file) {
  if (file.size > 10 * 1024 * 1024) { alert('图片太大了，请选择 10MB 以内的图片'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    selectedFileData = e.target.result;
    document.getElementById('uploadPreview').src = selectedFileData;
    uploadZone.classList.add('has-image');
    validateForm();
  };
  reader.readAsDataURL(file);
}

/* 表单验证 */
function validateForm() {
  const title = document.getElementById('workTitle').value.trim();
  document.getElementById('btnSave').disabled = !(selectedFileData && title);
}
document.getElementById('workTitle').addEventListener('input', validateForm);
function resetForm() {
  selectedFileData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('workTitle').value = '';
  document.getElementById('workCategory').value = 'illust';
  document.getElementById('uploadPreview').src = '';
  uploadZone.classList.remove('has-image');
  document.getElementById('btnSave').disabled = true;
}

/* 拖拽排序 */
let sortableInstance = null;
function initSortable() {
  const gallery = document.getElementById('gallery');
  if (sortableInstance) sortableInstance.destroy();
  sortableInstance = Sortable.create(gallery, {
    animation: 200,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: () => { saveOrder(); },
  });
}
async function saveOrder() {
  const cards = document.querySelectorAll('.work-card');
  cards.forEach((card, i) => {
    const id = parseInt(card.dataset.id);
    const work = allWorks.find(w => w.id === id);
    if (work) work.order = i;
  });
  await saveWorksToGitHub('拖拽排序更新');
  renderWorks();
}

/* GitHub API — 保存 works.json */
async function saveWorksToGitHub(message) {
  if (!GH_TOKEN) { alert('需要先设置 GitHub Token（URL 带 ?token=xxx 访问一次）'); return false; }
  try {
    const data = await githubFetch(API_URL);
    const sha = data.sha;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(allWorks, null, 2))));
    await githubFetch(API_URL, {
      method: 'PUT',
      body: JSON.stringify({ message, content, sha }),
    });
    return true;
  } catch (e) {
    console.error('保存到 GitHub 失败:', e);
    alert('保存失败：' + e.message);
    return false;
  }
}

/* 添加作品 */
async function saveWork() {
  const title = document.getElementById('workTitle').value.trim();
  const category = document.getElementById('workCategory').value;
  if (!selectedFileData || !title) return;
  const saveBtn = document.getElementById('btnSave');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  const newId = allWorks.length ? Math.max(...allWorks.map(w => w.id)) + 1 : 1;
  allWorks.forEach(w => { w.order = (w.order ?? 0) + 1; });
  allWorks.unshift({ id: newId, title, category, image: selectedFileData, order: 0 });
  const ok = await saveWorksToGitHub('添加作品：' + title);
  if (ok) await loadWorks();
  closeModal();
  saveBtn.textContent = '保存';
  saveBtn.disabled = false;
}

/* 删除作品 */
async function confirmDelete(id, event) {
  event.stopPropagation();
  if (!confirm('确定删除这个作品吗？')) return;
  allWorks = allWorks.filter(w => w.id !== id);
  allWorks.forEach((w, i) => { w.order = i; });
  const ok = await saveWorksToGitHub('删除作品');
  if (ok) await loadWorks();
}

/* ESC 关闭 */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// 只有 URL 带 ?admin=1 才显示添加按钮
(function() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('admin')) {
    const btn = document.getElementById('btnAdd');
    if (btn) btn.style.display = 'none';
  }
})();

// 启动
loadWorks();
</script></script>
