<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>seele — 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #FFF8F5;
      --card-bg:     #FFFFFF;
      --text:        #4A3F3A;
      --text-light:  #9B8B82;
      --accent:      #E8A0B4;
      --accent-dark: #C97A8E;
      --accent-soft: #F6D5DC;
      --cream:       #FFF0EA;
      --border:      #F0E4DE;
      --shadow:      rgba(200, 140, 160, 0.15);
      --radius:      16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', 'SimSun', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ===== 导航 ===== */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,245,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between; height: 60px;
    }
    .nav-logo {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 22px; color: var(--accent-dark);
      text-decoration: none; letter-spacing: 3px;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* 添加按钮 */
    .btn-add {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 50px;
      border: 1.5px solid var(--accent);
      background: var(--card-bg);
      color: var(--accent-dark);
      font-family: inherit; font-size: 13px;
      letter-spacing: 1px; cursor: pointer;
      transition: all 0.3s;
    }
    .btn-add:hover {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 14px var(--shadow);
      transform: translateY(-2px);
    }

    .nav-link {
      text-decoration: none; color: var(--text-light);
      font-size: 13px; letter-spacing: 2px;
      transition: color 0.3s;
    }
    .nav-link:hover { color: var(--accent-dark); }

    /* ===== Hero ===== */
    header {
      text-align: center; padding: 80px 24px 60px;
      background: linear-gradient(180deg, var(--cream) 0%, var(--bg) 100%);
      position: relative; overflow: hidden;
    }
    header::before, header::after {
      content: ''; position: absolute; border-radius: 50%; opacity: 0.35; z-index: 0;
    }
    header::before {
      width: 380px; height: 380px;
      background: radial-gradient(circle, var(--accent-soft), transparent 70%);
      top: -120px; right: -80px;
    }
    header::after {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #FFF0D4, transparent 70%);
      bottom: -60px; left: -60px;
    }
    .hero-content { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 6px var(--cream), 0 4px 20px var(--shadow);
      margin-bottom: 24px; background: var(--accent-soft);
    }
    .hero-name {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 42px; color: var(--accent-dark); letter-spacing: 6px; margin-bottom: 8px;
    }
    .hero-sub {
      font-size: 13px; color: var(--text-light); letter-spacing: 4px; margin-bottom: 20px;
    }
    .hero-bio {
      font-size: 15px; color: var(--text); max-width: 420px; margin: 0 auto 28px; opacity: 0.8;
    }
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 32px;
    }

    /* ===== 筛选 ===== */
    .filter-bar {
      display: flex; justify-content: center; gap: 8px;
      padding: 40px 24px 32px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 22px; border-radius: 50px;
      border: 1.5px solid var(--border); background: var(--card-bg);
      color: var(--text-light); font-family: inherit;
      font-size: 13px; letter-spacing: 2px; cursor: pointer;
      transition: all 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 4px 14px var(--shadow);
    }

    /* ===== 画廊 ===== */
    .gallery-wrap { position: relative; }
    .gallery {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px 80px; columns: 3 280px; column-gap: 20px;
    }

    .work-card {
      break-inside: avoid; margin-bottom: 20px;
      border-radius: var(--radius); overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 2px 12px var(--shadow);
      transition: transform 0.35s, box-shadow 0.35s;
      position: relative;
    }
    .work-card:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(200,140,160,0.25); }
    .work-card img { width: 100%; display: block; }
    .work-info { padding: 14px 16px 16px; }
    .work-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .work-tag { font-size: 11px; color: var(--accent-dark); letter-spacing: 1px; }

    /* 悬停遮罩 */
    .work-card .overlay {
      position: absolute; inset: 0;
      background: rgba(200,120,140,0.85);
      display: flex; align-items: center; justify-content: center;
      gap: 20px; opacity: 0; transition: opacity 0.3s; border-radius: var(--radius);
    }
    .work-card:hover .overlay { opacity: 1; }
    .overlay span {
      color: #fff; font-size: 13px; letter-spacing: 3px; cursor: pointer;
    }
    .overlay .btn-delete {
      color: #fff; font-size: 12px; letter-spacing: 2px;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.5);
      border-radius: 8px; padding: 4px 12px; cursor: pointer;
      transition: background 0.3s;
    }
    .overlay .btn-delete:hover { background: rgba(180,60,60,0.7); }

    .tag-comic    { --accent: #C49AD4; --accent-dark: #9B6EB5; }
    .tag-illust   { --accent: #E8A0B4; --accent-dark: #C97A8E; }
    .tag-video    { --accent: #7EBAD6; --accent-dark: #4A93B5; }
    .tag-game     { --accent: #A8C97E; --accent-dark: #7BA84A; }

    /* 空状态 */
    .empty-state {
      text-align: center; color: var(--text-light); padding: 60px 24px;
      font-size: 14px; letter-spacing: 2px;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(60,40,45,0.45);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 200; justify-content: center; align-items: center;
      padding: 24px; animation: fadeIn 0.25s ease;
    }
    .modal-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .modal {
      background: var(--card-bg); border-radius: var(--radius);
      width: 100%; max-width: 500px; padding: 36px 32px 28px;
      box-shadow: 0 20px 60px rgba(60,40,45,0.2);
      animation: slideUp 0.3s ease; position: relative;
    }
    .modal-title {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 22px; color: var(--accent-dark);
      letter-spacing: 3px; margin-bottom: 24px; text-align: center;
    }
    .modal-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; color: var(--text-light);
      font-size: 22px; cursor: pointer; line-height: 1;
      transition: color 0.3s;
    }
    .modal-close:hover { color: var(--text); }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 13px; color: var(--text-light);
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .form-input, .form-select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 14px; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color 0.3s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }

    /* 上传区域 */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 24px; text-align: center; cursor: pointer;
      transition: all 0.3s; position: relative;
      background: var(--bg);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent); background: var(--accent-soft);
    }
    .upload-zone.has-image { padding: 8px; }
    .upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
    .upload-text { font-size: 13px; color: var(--text-light); letter-spacing: 1px; }
    .upload-hint { font-size: 11px; color: var(--text-light); margin-top: 6px; opacity: 0.6; }
    .upload-preview {
      max-width: 100%; max-height: 260px; border-radius: 8px;
      display: none; object-fit: contain;
    }
    .upload-zone.has-image .upload-preview { display: block; }
    .upload-zone.has-image .upload-icon,
    .upload-zone.has-image .upload-text,
    .upload-zone.has-image .upload-hint { display: none; }

    #fileInput { display: none; }

    .form-actions {
      display: flex; gap: 10px; margin-top: 28px;
    }
    .form-actions button {
      flex: 1; padding: 10px; border-radius: 50px;
      font-family: inherit; font-size: 14px; letter-spacing: 2px;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-cancel {
      background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text-light);
    }
    .btn-cancel:hover { border-color: var(--text-light); }
    .btn-save {
      background: var(--accent); border: 1.5px solid var(--accent);
      color: #fff;
    }
    .btn-save:hover {
      background: var(--accent-dark); border-color: var(--accent-dark);
      box-shadow: 0 4px 14px var(--shadow);
    }
    .btn-save:disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* ===== 页脚 ===== */
    footer {
      text-align: center; padding: 40px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-light); letter-spacing: 2px;
    }

    /* ===== 动画 ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 640px) {
      .hero-name  { font-size: 30px; }
      nav         { padding: 0 20px; }
      .gallery    { columns: 2; column-gap: 14px; padding: 0 14px 60px; }
      .modal      { padding: 28px 20px; }
      .nav-links  { display: none; }
    }
  </style>
</head>
<body>

<!-- ========== 导航栏 ========== -->
<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo">SE E L E</a>
    <div class="nav-right">
      <button class="btn-add" onclick="openModal()">+ 添加作品</button>
    </div>
  </div>
</nav>

<!-- ========== 头部 ========== -->
<header>
  <div class="hero-content">
    <img src="https://api.dicebear.com/7.x/miniavs/svg?seed=seele&backgroundColor=ffe4ea" alt="seele" class="avatar">
    <h1 class="hero-name">seele</h1>
    <p class="hero-sub">插画 / 漫画 / 视频 / 游戏</p>
    <div class="divider"></div>
    <p class="hero-bio">
      用画笔筑一个小小的世界。<br>
      漫画记录故事，插画留住情绪，视频呈现想象，游戏承载冒险。
    </p>
  </div>
</header>

<!-- ========== 作品区 ========== -->
<section id="works">
  <div class="filter-bar"></div>
  <div class="gallery-wrap">
    <div class="gallery" id="gallery"></div>
  </div>
</section>

<!-- ========== 添加作品弹窗 ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">✦ 添加作品</div>

    <div class="form-group">
      <label class="form-label">作品图片</label>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🖼</div>
        <div class="upload-text">点击选择图片</div>
        <div class="upload-hint">支持 JPG / PNG / WebP</div>
        <img class="upload-preview" id="uploadPreview" alt="">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="workTitle">作品名称</label>
      <input class="form-input" id="workTitle" type="text" placeholder="给作品起个名字吧" maxlength="50">
    </div>

    <div class="form-group">
      <label class="form-label" for="workCategory">作品分类</label>
      <select class="form-select" id="workCategory">
        <option value="illust">插画</option>
        <option value="comic">漫画</option>
        <option value="video">视频</option>
        <option value="game">游戏</option>
      </select>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="btnSave" onclick="saveWork()" disabled>保存</button>
    </div>
  </div>
</div>

<!-- ========== 页脚 ========== -->
<footer>
  <p>© 2025 seele · 欢迎交流合作</p>
</footer>

<script>
/* ===========================
   IndexedDB — 本地存储
   =========================== */
const DB_NAME = 'SeelePortfolio';
const DB_VER = 1;
const STORE = 'works';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('category', 'category', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

/* ===========================
   数据操作
   =========================== */
async function getAllWorks() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function addWork(work) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).add(work);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function deleteWork(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

/* ===========================
   Demo 作品（首次使用时导入）
   =========================== */
const DEMO_WORKS = [
  { title: '漫画作品 #1', category: 'comic', image: 'https://picsum.photos/seed/comic1/600/800' },
  { title: '插画作品 #1', category: 'illust', image: 'https://picsum.photos/seed/illust1/600/450' },
  { title: '视频作品 #1', category: 'video', image: 'https://picsum.photos/seed/video1/600/340' },
  { title: '游戏Demo #1', category: 'game', image: 'https://picsum.photos/seed/game1/600/600' },
  { title: '插画作品 #2', category: 'illust', image: 'https://picsum.photos/seed/illust2/600/750' },
  { title: '漫画作品 #2', category: 'comic', image: 'https://picsum.photos/seed/comic2/600/500' },
];

let currentFilter = 'all';

/* ===========================
   Category helpers
   =========================== */
const CAT_LABELS = { comic: '漫画', illust: '插画', video: '视频', game: '游戏' };
const CAT_TAGS  = { comic: 'tag-comic', illust: 'tag-illust', video: 'tag-video', game: 'tag-game' };

/* ===========================
   渲染
   =========================== */
function renderWorks(works, filter) {
  const gallery = document.getElementById('gallery');

  if (!works.length) {
    gallery.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎨</div>
        <p>还没有作品，点击右上角「+ 添加作品」开始吧</p>
      </div>`;
    return;
  }

  const filtered = filter === 'all' ? works : works.filter(w => w.category === filter);
  if (!filtered.length) {
    gallery.innerHTML = `<div class="empty-state"><p>这个分类还没有作品 ✦</p></div>`;
    return;
  }

  gallery.innerHTML = filtered.map((w, i) => `
    <div class="work-card ${CAT_TAGS[w.category]}" data-category="${w.category}" style="animation: fadeUp 0.6s ease both; animation-delay: ${(i % 6) * 0.05}s">
      <img src="${w.image}" alt="${w.title}" loading="lazy">
      <div class="overlay">
        <span>查看</span>
        <button class="btn-delete" onclick="confirmDelete(${w.id}, event)">删除</button>
      </div>
      <div class="work-info">
        <div class="work-title">${w.title}</div>
        <div class="work-tag">${CAT_LABELS[w.category]}</div>
      </div>
    </div>
  `).join('');
}

function renderFilterBar(works) {
  const categories = new Set(works.map(w => w.category));
  const bar = document.querySelector('.filter-bar');
  const counts = { all: works.length };
  categories.forEach(c => { counts[c] = works.filter(w => w.category === c).length; });

  const items = [
    { key: 'all', label: `全部 ${works.length}` },
    ...Object.entries(CAT_LABELS).map(([k,v]) => ({ key: k, label: `${v} ${counts[k] || 0}` })),
  ];

  bar.innerHTML = items.map(i => `
    <button class="filter-btn ${i.key === currentFilter ? 'active' : ''}" data-filter="${i.key}">
      ${i.label}
    </button>
  `).join('');

  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      // Re-render from full works list
      getAllWorks().then(works => renderWorks(works, currentFilter));
    });
  });
}

/* ===========================
   初始化 — 首次使用导入 demo
   =========================== */
async function initPortfolio() {
  const existing = await getAllWorks();
  if (existing.length === 0) {
    for (const w of DEMO_WORKS) {
      await addWork(w);
    }
    const all = await getAllWorks();
    renderFilterBar(all);
    renderWorks(all, currentFilter);
  } else {
    renderFilterBar(existing);
    renderWorks(existing, currentFilter);
  }
}

/* ===========================
   弹窗控制
   =========================== */
function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('workTitle').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  resetForm();
}

/* 点击遮罩关闭 */
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

/* ===========================
   图片上传
   =========================== */
let selectedFileData = null;

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  readFile(file);
}

// 拖拽支持
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) readFile(file);
});

function readFile(file) {
  // 限制 10MB
  if (file.size > 10 * 1024 * 1024) {
    alert('图片太大了，请选择 10MB 以内的图片');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    selectedFileData = e.target.result;
    const preview = document.getElementById('uploadPreview');
    preview.src = selectedFileData;
    uploadZone.classList.add('has-image');
    validateForm();
  };
  reader.readAsDataURL(file);
}

/* ===========================
   表单验证
   =========================== */
function validateForm() {
  const title = document.getElementById('workTitle').value.trim();
  const saveBtn = document.getElementById('btnSave');
  saveBtn.disabled = !(selectedFileData && title);
}

document.getElementById('workTitle').addEventListener('input', validateForm);

function resetForm() {
  selectedFileData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('workTitle').value = '';
  document.getElementById('workCategory').value = 'illust';
  document.getElementById('uploadPreview').src = '';
  uploadZone.classList.remove('has-image');
  document.getElementById('btnSave').disabled = true;
}

/* ===========================
   保存作品
   =========================== */
async function saveWork() {
  const title = document.getElementById('workTitle').value.trim();
  const category = document.getElementById('workCategory').value;
  if (!selectedFileData || !title) return;

  const saveBtn = document.getElementById('btnSave');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';

  await addWork({ title, category, image: selectedFileData });

  // 重新渲染
  const all = await getAllWorks();
  renderFilterBar(all);
  renderWorks(all, currentFilter);

  closeModal();
  saveBtn.textContent = '保存';
}

/* ===========================
   删除作品
   =========================== */
async function confirmDelete(id, event) {
  event.stopPropagation();
  if (!confirm('确定删除这个作品吗？')) return;
  await deleteWork(id);
  const all = await getAllWorks();
  renderFilterBar(all);
  renderWorks(all, currentFilter);
}

/* ===========================
   ESC 关闭
   =========================== */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// 启动
initPortfolio();
</script>
