<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>seele — 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <style>
    :root {
      --bg: #fafafa;
      --card-bg: #fff;
      --text: #333;
      --text-light: #999;
      --text-mid: #666;
      --accent: #333;
      --border: #eee;
      --hover-bg: #f5f5f5;
      --radius: 4px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* ===== 顶部栏 ===== */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: 1000px; margin: 0 auto;
      padding: 0 24px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-logo {
      font-size: 18px; font-weight: 700;
      letter-spacing: 1px; color: var(--text);
    }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .btn-add {
      padding: 6px 16px; border-radius: var(--radius);
      border: 1px solid var(--accent); background: var(--card-bg);
      color: var(--text); font-family: inherit; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-add:hover { background: var(--accent); color: #fff; }

    /* ===== 个人信息区 ===== */
    .profile {
      max-width: 1000px; margin: 0 auto;
      padding: 40px 24px 28px;
      display: flex; align-items: flex-start; gap: 24px;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .profile-info { flex: 1; }
    .profile-name {
      font-size: 22px; font-weight: 700;
      margin-bottom: 4px; letter-spacing: 0.5px;
    }
    .profile-bio {
      font-size: 13px; color: var(--text-mid);
      line-height: 1.6; margin-bottom: 10px;
    }
    .profile-stats {
      display: flex; gap: 20px; font-size: 12px; color: var(--text-light);
    }
    .profile-stats span strong {
      color: var(--text); font-weight: 600; font-size: 14px;
      margin-right: 3px;
    }

    /* ===== 筛选标签 ===== */
    .filter-bar {
      max-width: 1000px; margin: 0 auto;
      padding: 0 24px; display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      padding: 10px 16px; background: none; border: none;
      font-family: inherit; font-size: 14px; color: var(--text-light);
      cursor: pointer; transition: color 0.2s;
      position: relative; bottom: -1px;
      border-bottom: 2px solid transparent;
    }
    .filter-btn:hover { color: var(--text-mid); }
    .filter-btn.active {
      color: var(--text); border-bottom-color: var(--text);
    }

    /* ===== 画廊 ===== */
    .gallery {
      max-width: 1000px; margin: 0 auto;
      padding: 20px 24px 80px;
      columns: 3 280px; column-gap: 16px;
    }
    .work-card {
      break-inside: avoid; margin-bottom: 16px;
      border-radius: var(--radius); overflow: hidden;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      position: relative; cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .work-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .work-card img { width: 100%; display: block; }
    .work-card .card-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.2s;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .work-card:hover .card-overlay { opacity: 1; }
    .card-overlay .card-title {
      color: #fff; font-size: 14px; font-weight: 500;
      text-align: center; margin-bottom: 8px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .card-overlay .card-cat {
      color: rgba(255,255,255,0.7); font-size: 11px;
      letter-spacing: 1px;
    }
    .card-overlay .btn-delete {
      margin-top: 12px; padding: 4px 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 3px; color: #fff;
      font-size: 11px; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
    }
    .card-overlay .btn-delete:hover {
      background: rgba(200,50,50,0.7); border-color: transparent;
    }

    /* 空状态 */
    .empty-state {
      text-align: center; color: var(--text-light);
      padding: 80px 24px; font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 200; justify-content: center; align-items: center;
      padding: 24px; animation: fadeIn 0.2s ease;
    }
    .modal-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .modal {
      background: var(--card-bg); border-radius: 8px;
      width: 100%; max-width: 460px; padding: 32px 28px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      animation: slideUp 0.25s ease; position: relative;
    }
    .modal-title {
      font-size: 18px; font-weight: 700;
      margin-bottom: 24px; text-align: center;
    }
    .modal-close {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: var(--text-light);
      font-size: 20px; cursor: pointer; line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 13px; color: var(--text-mid);
      margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 14px; color: var(--text);
      background: #fff; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }

    .upload-zone {
      border: 1px dashed var(--border); border-radius: var(--radius);
      padding: 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative; background: #fafafa;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent); background: var(--hover-bg);
    }
    .upload-zone.has-image { padding: 6px; }
    .upload-icon { font-size: 24px; margin-bottom: 6px; opacity: 0.35; }
    .upload-text { font-size: 13px; color: var(--text-light); }
    .upload-hint { font-size: 11px; color: var(--text-light); margin-top: 4px; opacity: 0.6; }
    .upload-preview {
      max-width: 100%; max-height: 240px; border-radius: var(--radius);
      display: none; object-fit: contain;
    }
    .upload-zone.has-image .upload-preview { display: block; }
    .upload-zone.has-image .upload-icon,
    .upload-zone.has-image .upload-text,
    .upload-zone.has-image .upload-hint { display: none; }
    #fileInput { display: none; }

    .form-actions { display: flex; gap: 8px; margin-top: 24px; }
    .form-actions button {
      flex: 1; padding: 10px; border-radius: var(--radius);
      font-family: inherit; font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel {
      background: #fff; border: 1px solid var(--border); color: var(--text-mid);
    }
    .btn-cancel:hover { border-color: var(--text-light); }
    .btn-save {
      background: var(--accent); border: 1px solid var(--accent); color: #fff;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== 页脚 ===== */
    footer {
      text-align: center; padding: 32px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-light);
    }

    /* ===== 拖拽 ===== */
    .work-card.sortable-ghost { opacity: 0.3; }
    .work-card.sortable-chosen { opacity: 0.7; }

    /* ===== 响应式 ===== */
    @media (max-width: 640px) {
      .topbar-inner { padding: 0 16px; }
      .profile { padding: 24px 16px 20px; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
      .profile-stats { justify-content: center; }
      .filter-bar { padding: 0 16px; }
      .gallery { columns: 2; column-gap: 10px; padding: 16px 10px 60px; }
      .modal { padding: 24px 18px 18px; }
    }
  </style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-logo">seele</a>
    <div class="topbar-right">
      <button class="btn-add" id="btnAdd" onclick="openModal()">+ 添加作品</button>
    </div>
  </div>
</div>

<!-- 个人信息 -->
<div class="profile">
  <img src="https://api.dicebear.com/7.x/miniavs/svg?seed=seele&backgroundColor=f0f0f0" alt="seele" class="profile-avatar">
  <div class="profile-info">
    <div class="profile-name">seele</div>
    <div class="profile-bio">插画 / 漫画 / 视频 / 游戏 — 用画笔筑一个小小的世界</div>
    <div class="profile-stats">
      <span><strong id="stat-total">0</strong>作品</span>
      <span><strong>4</strong>分类</span>
    </div>
  </div>
</div>

<!-- 筛选 -->
<div class="filter-bar" id="filterBar"></div>

<!-- 画廊 -->
<div class="gallery" id="gallery"></div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">添加作品</div>
    <div class="form-group">
      <label class="form-label">作品图片</label>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🖼</div>
        <div class="upload-text">点击选择图片</div>
        <div class="upload-hint">JPG / PNG / WebP，10MB 以内</div>
        <img class="upload-preview" id="uploadPreview" alt="">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="workTitle">作品名称</label>
      <input class="form-input" id="workTitle" type="text" placeholder="给作品起个名字" maxlength="50">
    </div>
    <div class="form-group">
      <label class="form-label" for="workCategory">分类</label>
      <select class="form-select" id="workCategory">
        <option value="illust">插画</option>
        <option value="comic">漫画</option>
        <option value="video">视频</option>
        <option value="game">游戏</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="btnSave" onclick="saveWork()" disabled>保存</button>
    </div>
  </div>
</div>

<!-- 页脚 -->
<footer>
  <p>© 2025 seele</p>
</footer>

<script>
/* ===== 数据配置 ===== */
const REPO_OWNER = 'Seferis0007';
const REPO_NAME  = 'Seferis0007.github.io';
const WORKS_PATH = 'works.json';
const API_URL    = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${WORKS_PATH}`;
const RAW_URL    = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${WORKS_PATH}`;

/* ===== Token 管理 ===== */
function getToken() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('token')) {
    const t = params.get('token');
    localStorage.setItem('gh_token', t);
    const newUrl = window.location.pathname + (params.has('admin') ? '?admin=1' : '') + window.location.hash;
    history.replaceState(null, '', newUrl);
    return t;
  }
  return localStorage.getItem('gh_token') || '';
}
const GH_TOKEN = getToken();

async function githubFetch(url, options = {}) {
  const headers = {
    'Authorization': 'token ' + GH_TOKEN,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github.v3+json',
  };
  if (options.headers) Object.assign(headers, options.headers);
  const res = await fetch(url, Object.assign({}, options, { headers }));
  if (!res.ok) {
    const text = await res.text();
    throw new Error('GitHub API ' + res.status + ': ' + text);
  }
  return res.json();
}

/* ===== 数据 ===== */
let allWorks = [];
let currentFilter = 'all';
const CAT_LABELS = { comic: '漫画', illust: '插画', video: '视频', game: '游戏' };

async function loadWorks() {
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('加载失败');
    allWorks = await res.json();
    allWorks.sort((a, b) => (a.order != null ? a.order : Infinity) - (b.order != null ? b.order : Infinity));
    document.getElementById('stat-total').textContent = allWorks.length;
    renderFilterBar();
    renderWorks();
  } catch (e) {
    console.error(e);
    document.getElementById('gallery').innerHTML = '<div class="empty-state"><p>加载作品失败</p></div>';
  }
}

function renderFilterBar() {
  const counts = { all: allWorks.length };
  Object.keys(CAT_LABELS).forEach(k => {
    counts[k] = allWorks.filter(w => w.category === k).length;
  });
  const items = [
    { key: 'all', label: '全部 ' + counts.all },
    ...Object.entries(CAT_LABELS).map(([k, v]) => ({ key: k, label: v + ' ' + (counts[k] || 0) })),
  ];
  document.getElementById('filterBar').innerHTML = items.map(i =>
    `<button class="filter-btn ${i.key === currentFilter ? 'active' : ''}" data-filter="${i.key}">${i.label}</button>`
  ).join('');
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderWorks();
    });
  });
}

function renderWorks() {
  const gallery = document.getElementById('gallery');
  const filtered = currentFilter === 'all' ? allWorks : allWorks.filter(w => w.category === currentFilter);
  if (!filtered.length) {
    gallery.innerHTML = allWorks.length === 0
      ? '<div class="empty-state"><div class="empty-icon">🎨</div><p>还没有作品</p></div>'
      : '<div class="empty-state"><p>这个分类还没有作品</p></div>';
    return;
  }
  gallery.innerHTML = filtered.map(w =>
    `<div class="work-card" data-id="${w.id}">
      <img src="${w.image}" alt="${w.title}" loading="lazy">
      <div class="card-overlay">
        <div class="card-title">${w.title}</div>
        <div class="card-cat">${CAT_LABELS[w.category] || ''}</div>
        <button class="btn-delete" onclick="confirmDelete(${w.id}, event)">删除</button>
      </div>
    </div>`
  ).join('');
  initSortable();
}

/* ===== 弹窗 ===== */
function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('workTitle').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  resetForm();
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* ===== 图片上传 ===== */
let selectedFileData = null;
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) readFile(file);
}
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) readFile(file);
});
function readFile(file) {
  if (file.size > 10 * 1024 * 1024) { alert('图片不能超过 10MB'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    selectedFileData = e.target.result;
    document.getElementById('uploadPreview').src = selectedFileData;
    uploadZone.classList.add('has-image');
    validateForm();
  };
  reader.readAsDataURL(file);
}

function validateForm() {
  const title = document.getElementById('workTitle').value.trim();
  document.getElementById('btnSave').disabled = !(selectedFileData && title);
}
document.getElementById('workTitle').addEventListener('input', validateForm);
function resetForm() {
  selectedFileData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('workTitle').value = '';
  document.getElementById('workCategory').value = 'illust';
  document.getElementById('uploadPreview').src = '';
  uploadZone.classList.remove('has-image');
  document.getElementById('btnSave').disabled = true;
}

/* ===== 拖拽排序 ===== */
let sortableInstance = null;
function initSortable() {
  const gallery = document.getElementById('gallery');
  if (sortableInstance) sortableInstance.destroy();
  sortableInstance = Sortable.create(gallery, {
    animation: 200,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: () => saveOrder(),
  });
}
async function saveOrder() {
  document.querySelectorAll('.work-card').forEach((card, i) => {
    const id = parseInt(card.dataset.id);
    const work = allWorks.find(w => w.id === id);
    if (work) work.order = i;
  });
  await saveWorksToGitHub('拖拽排序更新');
  renderWorks();
}

/* ===== GitHub 保存 ===== */
async function saveWorksToGitHub(message) {
  if (!GH_TOKEN) { alert('需要先设置 GitHub Token（URL 带 ?token=xxx 访问一次）'); return false; }
  try {
    const data = await githubFetch(API_URL);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(allWorks, null, 2))));
    await githubFetch(API_URL, {
      method: 'PUT',
      body: JSON.stringify({ message: message, content: content, sha: data.sha }),
    });
    return true;
  } catch (e) {
    console.error(e);
    alert('保存失败: ' + e.message);
    return false;
  }
}

/* ===== 添加作品 ===== */
async function saveWork() {
  const title = document.getElementById('workTitle').value.trim();
  const category = document.getElementById('workCategory').value;
  if (!selectedFileData || !title) return;
  const saveBtn = document.getElementById('btnSave');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  const newId = allWorks.length ? Math.max(...allWorks.map(w => w.id)) + 1 : 1;
  allWorks.forEach(w => { w.order = (w.order != null ? w.order : 0) + 1; });
  allWorks.unshift({ id: newId, title: title, category: category, image: selectedFileData, order: 0 });
  const ok = await saveWorksToGitHub('添加作品: ' + title);
  if (ok) await loadWorks();
  closeModal();
  saveBtn.textContent = '保存';
  saveBtn.disabled = false;
}

/* ===== 删除作品 ===== */
async function confirmDelete(id, event) {
  event.stopPropagation();
  if (!confirm('确定删除这个作品吗？')) return;
  allWorks = allWorks.filter(w => w.id !== id);
  allWorks.forEach((w, i) => { w.order = i; });
  const ok = await saveWorksToGitHub('删除作品');
  if (ok) await loadWorks();
}

/* ===== ESC 关闭 ===== */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ===== Admin 按钮显隐 ===== */
(function() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('admin')) {
    const btn = document.getElementById('btnAdd');
    if (btn) btn.style.display = 'none';
  }
})();

/* ===== 启动 ===== */
loadWorks();
</script>

</body>
</html>
